name: 📊 Atualizar Stats myfxbook

on:
  schedule:
    - cron: '0 8 * * *'   # Todos os dias às 08:00 UTC
  workflow_dispatch:        # Permite executar manualmente

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Baixar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Instalar dependências
        run: pip install requests

      - name: 🔍 Verificar se secrets estão configurados
        id: check_secrets
        run: |
          if [ -z "${{ secrets.MYFXBOOK_EMAIL }}" ] || [ -z "${{ secrets.MYFXBOOK_PASSWORD }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ Secrets MYFXBOOK_EMAIL / MYFXBOOK_PASSWORD não configurados. A saltar atualização."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "✅ Secrets encontrados. A executar script..."
          fi

      - name: 🔄 Executar script de atualização
        if: steps.check_sec