name: Atualizar Stats myfxbook

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests

      - name: Verificar secrets
        id: check
        run: |
          if [ -z "$MYFXBOOK_EMAIL" ] || [ -z "$MYFXBOOK_PASSWORD" ]; then
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "Secrets nao configurados — a saltar."
          else
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "Secrets encontrados!"
          fi
        env:
          MYFXBOOK_EMAIL: ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}

      - name: Executar fetch_stats.py
        if: steps.check.outputs.ok == 'true'
        run: python fetch_stats.py
        env:
          MYFXBOOK_EMAIL: ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD 