name: Atualizar Stats myfxbook

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Run fetch_stats
        run: python fetch_stats.py || echo "Stats fetch failed - keeping existing stats.json"
        env:
          MYFXBOOK_EMAIL: ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}

      - name: Commit stats.json
        run: |
          git config user.name "RICX Bot"
          git config user.email "bot@ricx.bot"
          git add stats.json
          git diff --staged --quiet || git commit -m "chore: update stats"
          git push
