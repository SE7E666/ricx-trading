name: 📊 Atualizar Stats myfxbook

on:
  schedule:
    - cron: '0 8 * * *'   # Todos os dias às 08:00 UTC (09:00 Portugal / 05:00 BRT)
  workflow_dispatch:        # Permite executar manualmente com um clique

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Necessário para fazer commit do stats.json atualizado

    steps:
      - name: 📥 Baixar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: pip install requests

      - name: 🔄 Executar script de atualização
        run: python fetch_stats.py
        env:
          MYFXBOOK_EMAIL: ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}

      - name: 💾 Guardar stats.json atualizado
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 chore: atualizar stats myfxbook [skip ci]"
          file_pattern: stats.json
          commit_user_name: "RICX Stats Bot"
          commit_user_email: "bot@ricx.trading"
