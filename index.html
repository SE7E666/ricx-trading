<!doctype html>
<html lang="es">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>RICX CopyTrading — Invertí en piloto automático</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B2D5E;
  --navy-deep:#0F1729;
  --navy-ink:#0F1729;
  --cyan:#00C8CC;
  --cyan-soft:#E6FAFB;
  --bg:#F5F7FA;
  --white:#FFFFFF;
  --green:#10B981;
  --amber:#F59E0B;
  --line:#E6EAF2;
  --muted:#5A6478;
  --muted-2:#8A94A8;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter', system-ui, sans-serif;
  color:var(--navy-ink);
  background:#fff;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv11";
  line-height:1.5;
}
.num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"}
.mono{font-family:'JetBrains Mono', monospace}
a{color:inherit; text-decoration:none}
button{font-family:inherit; cursor:pointer}
img{max-width:100%; display:block}

/* ——— Layout ——— */
.wrap{max-width:1280px; margin:0 auto; padding:0 32px}

/* ——— Nav ——— */
.nav{
  position:sticky; top:0; z-index:50;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid transparent;
  transition:border-color .2s, box-shadow .2s;
}
.nav.scrolled{
  border-bottom-color:var(--line);
  box-shadow:0 2px 12px rgba(15,23,41,.04);
}
.nav-inner{display:flex; align-items:center; justify-content:space-between; height:72px}
.logo{display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:-.02em; font-size:20px; color:var(--navy)}
.logo-mark{
  width:36px; height:36px; border-radius:10px;
  background:var(--navy);
  display:grid; place-items:center;
  position:relative;
  box-shadow:0 4px 14px rgba(27,45,94,.25);
}
.logo-mark svg{width:22px; height:22px; display:block}
.logo-mark::after{
  content:""; position:absolute; right:-4px; bottom:-4px;
  width:12px; height:12px; border-radius:50%;
  background:var(--cyan);
  border:2px solid #fff;
}
.nav-links{display:flex; gap:36px}
.nav-links a{
  font-size:14px; font-weight:500; color:var(--navy-ink);
  padding:6px 0; position:relative;
}
.nav-links a:hover{color:var(--navy)}
.nav-right{display:flex; align-items:center; gap:12px}
.lang-btns{display:inline-flex; background:#F0F2F7; border-radius:10px; padding:3px; gap:2px}
.lang-btn{
  border:0; background:transparent; color:var(--muted);
  font-size:12px; font-weight:700; letter-spacing:.05em;
  padding:6px 10px; border-radius:8px; cursor:pointer;
  transition:all .18s;
}
.lang-btn.active{background:#fff; color:var(--navy); box-shadow:0 1px 3px rgba(15,23,41,.08)}
.lang-btn:hover:not(.active){color:var(--navy-ink)}
.btn{
  display:inline-flex; align-items:center; gap:8px;
  font-weight:600; font-size:15px;
  padding:12px 22px; border-radius:12px;
  border:1px solid transparent;
  transition:transform .15s, box-shadow .2s, background .2s;
}
.btn-primary{
  background:var(--navy); color:#fff;
  box-shadow:0 8px 24px -8px rgba(27,45,94,.5);
}
.btn-primary:hover{transform:translateY(-1px); box-shadow:0 12px 28px -8px rgba(27,45,94,.6)}
.btn-ghost{
  background:transparent; color:var(--navy);
  border-color:var(--line);
}
.btn-ghost:hover{background:#fff; border-color:#C8D0E0}
.btn-cyan{
  background:#fff; color:var(--navy);
  font-weight:700;
  box-shadow:0 10px 30px -10px rgba(15,23,41,.3);
}
.btn-sm{padding:10px 18px; font-size:14px; border-radius:10px}

/* ——— Hero ——— */
.hero{
  position:relative; overflow:hidden;
  padding:72px 0 96px;
  background:
    radial-gradient(1000px 600px at 85% 20%, rgba(0,200,204,.1), transparent 60%),
    radial-gradient(800px 500px at 20% 80%, rgba(27,45,94,.04), transparent 60%),
    #fff;
}
.hero-grid{
  display:grid; grid-template-columns:minmax(0,1.2fr) minmax(0,1fr);
  gap:64px; align-items:center;
}
.eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:#008C90;
  background:var(--cyan-soft);
  padding:8px 14px; border-radius:100px;
  border:1px solid rgba(0,200,204,.28);
}
.eyebrow .dot{width:6px; height:6px; border-radius:50%; background:var(--cyan); box-shadow:0 0 0 3px rgba(0,200,204,.25)}
h1.hero-h1{
  font-size:80px; line-height:1; letter-spacing:-.035em;
  font-weight:800; margin:24px 0 20px;
  color:var(--navy);
}
h1.hero-h1 em{
  font-style:normal;
  background:linear-gradient(110deg, var(--navy) 10%, #3557B2 50%, var(--cyan) 95%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.hero-sub{
  font-size:19px; line-height:1.6; color:var(--muted);
  max-width:560px; margin:0 0 32px;
}
.hero-ctas{display:flex; gap:12px; margin-bottom:28px}
.trust-row{
  display:flex; gap:20px; align-items:center;
  font-size:13px; color:var(--muted);
  flex-wrap:wrap;
}
.trust-row .pill{display:inline-flex; align-items:center; gap:6px}
.trust-row b{color:var(--navy-ink); font-weight:700}
.trust-sep{width:4px; height:4px; border-radius:50%; background:#C8D0E0}

/* Phone */
.hero-visual{position:relative; height:640px}
.phone{
  position:absolute; left:50%; top:50%;
  transform:translate(-50%,-50%) rotate(-4deg);
  width:300px; height:610px;
  border-radius:42px;
  background:#0F1729;
  padding:10px;
  box-shadow:
    0 40px 80px -20px rgba(15,23,41,.35),
    0 20px 40px -10px rgba(27,45,94,.25),
    inset 0 0 0 1px rgba(255,255,255,.06);
  z-index:2;
}
.phone-screen{
  width:100%; height:100%;
  border-radius:34px;
  background:linear-gradient(180deg, #0B1330, #131E46);
  overflow:hidden;
  position:relative;
  color:#fff;
  padding:48px 20px 20px;
}
.phone-notch{
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  width:96px; height:28px; background:#000; border-radius:14px;
}
.phone-top{display:flex; justify-content:space-between; font-size:11px; color:#9CA8C6; margin-bottom:16px; font-weight:600}
.axi-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px}
.axi-logo{display:flex; align-items:center; gap:8px; font-weight:700; font-size:13px}
.axi-logo-mark{width:24px; height:24px; border-radius:7px; background:#fff; color:#0F1729; display:grid; place-items:center; font-weight:800; font-size:11px}
.axi-bell{width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.08); display:grid; place-items:center}
.axi-card{
  background:linear-gradient(135deg, rgba(0,200,204,.22), rgba(0,200,204,.06));
  border:1px solid rgba(0,200,204,.35);
  border-radius:16px; padding:14px;
  margin-bottom:14px;
}
.axi-card-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
.axi-tag{font-size:9px; font-weight:700; letter-spacing:.1em; color:var(--cyan); background:rgba(0,200,204,.12); padding:3px 7px; border-radius:5px}
.axi-status{display:inline-flex; align-items:center; gap:5px; font-size:10px; color:#A5F3C9}
.axi-status .d{width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 0 3px rgba(16,185,129,.25)}
.axi-strat{font-weight:800; font-size:15px; letter-spacing:-.01em}
.axi-strat-sub{font-size:11px; color:#9CA8C6; margin-top:2px}
.axi-metrics{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px}
.axi-metric{background:rgba(255,255,255,.04); border-radius:9px; padding:8px}
.axi-metric .l{font-size:9px; color:#9CA8C6; text-transform:uppercase; letter-spacing:.06em}
.axi-metric .v{font-size:13px; font-weight:700; margin-top:2px}
.axi-metric .v.g{color:#34D399}
.axi-mini-chart{height:56px; margin-top:12px}
.axi-section-title{font-size:10px; color:#9CA8C6; text-transform:uppercase; letter-spacing:.08em; font-weight:700; margin:10px 2px 8px}
.trade-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 12px; background:rgba(255,255,255,.03); border-radius:10px; margin-bottom:6px;
  font-size:11px;
}
.trade-row .l{display:flex; flex-direction:column; gap:2px}
.trade-row .s{font-size:9px; color:#9CA8C6}
.trade-row .pnl{font-weight:700; color:#34D399; font-variant-numeric:tabular-nums}
.trade-row .pnl.r{color:#FCA5A5}

/* Floating chart card */
.float-card{
  position:absolute;
  border-radius:16px;
  background:#fff;
  box-shadow:0 20px 50px -10px rgba(15,23,41,.2), 0 0 0 1px var(--line);
  padding:18px;
  z-index:3;
}
.float-card-1{ top:60px; right:-10px; width:240px}
.float-card-2{ bottom:80px; left:-30px; width:220px}
.fc-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
.fc-title{font-size:11px; color:var(--muted); font-weight:600}
.fc-big{font-size:24px; font-weight:800; letter-spacing:-.02em; color:var(--navy); font-variant-numeric:tabular-nums}
.fc-delta{font-size:12px; color:var(--green); font-weight:700; font-variant-numeric:tabular-nums}
.fc-chart{height:52px; margin-top:8px}

/* Background glow */
.glow{
  position:absolute; width:520px; height:520px;
  background:radial-gradient(circle, rgba(0,200,204,.35), transparent 70%);
  border-radius:50%;
  right:-40px; top:50%; transform:translateY(-50%);
  filter:blur(20px);
  z-index:0;
  opacity:.7;
}

/* ——— Stats strip ——— */
.stats{
  background:
    radial-gradient(800px 400px at 80% 50%, rgba(0,200,204,.15), transparent 60%),
    var(--navy);
  color:#fff;
  padding:48px 0;
  position:relative;
  overflow:hidden;
}
.stats::before{
  content:""; position:absolute; inset:0;
  background:
    linear-gradient(90deg, transparent 0%, rgba(0,200,204,.05) 50%, transparent 100%);
  pointer-events:none;
}
.stats-grid{
  display:grid; grid-template-columns:repeat(5,1fr);
  align-items:end;
}
.stat{
  padding:0 28px;
  position:relative;
  border-left:1px solid rgba(255,255,255,.1);
}
.stat:first-child{border-left:none}
.stat-label{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#8A99C4; font-weight:600; margin-bottom:8px}
.stat-value{
  font-size:42px; font-weight:800; letter-spacing:-.02em;
  font-variant-numeric:tabular-nums;
  line-height:1;
}
.stat-value.g{color:var(--cyan)}
.stat-spark{height:24px; margin-top:10px; opacity:.8}
.stat-sub{font-size:12px; color:#8A99C4; margin-top:6px}

/* ——— Sections base ——— */
.section{padding:120px 0}
.section-tight{padding:96px 0}
.sec-head{text-align:center; max-width:720px; margin:0 auto 64px}
.kicker{
  font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:#008C90; margin-bottom:16px;
}
h2.sec-title{
  font-size:56px; line-height:1.05; letter-spacing:-.03em;
  font-weight:800; color:var(--navy); margin:0 0 16px;
}
.sec-sub{font-size:18px; color:var(--muted); line-height:1.6}

/* ——— How it works ——— */
.how{position:relative}
.how-grid{
  display:grid; grid-template-columns:repeat(3,1fr); gap:32px;
  position:relative;
}
.how-line{
  position:absolute; top:44px; left:12%; right:12%;
  height:2px;
  background-image:linear-gradient(90deg, #C8D0E0 50%, transparent 50%);
  background-size:12px 2px;
  background-repeat:repeat-x;
  z-index:0;
}
.step{text-align:center; position:relative; z-index:1; padding:0 24px}
.step-num{
  display:inline-block;
  font-family:'Inter'; font-weight:800; font-size:12px; letter-spacing:.1em;
  color:#008C90;
  margin-bottom:14px;
}
.step-icon{
  width:88px; height:88px; border-radius:50%;
  background:#fff;
  border:2px solid var(--cyan);
  display:grid; place-items:center; margin:0 auto 24px;
  color:var(--na
